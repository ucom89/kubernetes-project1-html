<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Galerie Paysages</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- HEADER -->
  <header class="site-header">
    <div class="container">
      <h1>Galerie Paysages</h1>
      <p>Une collection de 10 paysages naturels et urbains</p>
    </div>
  </header>

  <!-- MAIN -->
  <main class="main-content">
    <div class="container">
      <div class="gallery-grid">

        <article class="card">
          <div class="card__image-wrapper">
            <img src="img/mountain.svg" alt="Montagne" loading="lazy" />
          </div>
          <div class="card__body">
            <h2 class="card__title">Montagne</h2>
            <span class="card__tag">Nature</span>
          </div>
        </article>

        <article class="card">
          <div class="card__image-wrapper">
            <img src="img/ocean.svg" alt="Ocean" loading="lazy" />
          </div>
          <div class="card__body">
            <h2 class="card__title">Ocean</h2>
            <span class="card__tag">Eau</span>
          </div>
        </article>

        <article class="card">
          <div class="card__image-wrapper">
            <img src="img/forest.svg" alt="Foret" loading="lazy" />
          </div>
          <div class="card__body">
            <h2 class="card__title">Foret</h2>
            <span class="card__tag">Nature</span>
          </div>
        </article>

        <article class="card">
          <div class="card__image-wrapper">
            <img src="img/desert.svg" alt="Desert" loading="lazy" />
          </div>
          <div class="card__body">
            <h2 class="card__title">Desert</h2>
            <span class="card__tag">Aride</span>
          </div>
        </article>

        <article class="card">
          <div class="card__image-wrapper">
            <img src="img/city.svg" alt="Ville" loading="lazy" />
          </div>
          <div class="card__body">
            <h2 class="card__title">Ville</h2>
            <span class="card__tag">Urbain</span>
          </div>
        </article>

        <article class="card">
          <div class="card__image-wrapper">
            <img src="img/river.svg" alt="Riviere" loading="lazy" />
          </div>
          <div class="card__body">
            <h2 class="card__title">Riviere</h2>
            <span class="card__tag">Eau</span>
          </div>
        </article>

        <article class="card">
          <div class="card__image-wrapper">
            <img src="img/sunset.svg" alt="Coucher de Soleil" loading="lazy" />
          </div>
          <div class="card__body">
            <h2 class="card__title">Coucher de Soleil</h2>
            <span class="card__tag">Ciel</span>
          </div>
        </article>

        <article class="card">
          <div class="card__image-wrapper">
            <img src="img/snow.svg" alt="Neige" loading="lazy" />
          </div>
          <div class="card__body">
            <h2 class="card__title">Neige</h2>
            <span class="card__tag">Hiver</span>
          </div>
        </article>

        <article class="card">
          <div class="card__image-wrapper">
            <img src="img/jungle.svg" alt="Jungle" loading="lazy" />
          </div>
          <div class="card__body">
            <h2 class="card__title">Jungle</h2>
            <span class="card__tag">Tropical</span>
          </div>
        </article>

        <article class="card">
          <div class="card__image-wrapper">
            <img src="img/volcano.svg" alt="Volcan" loading="lazy" />
          </div>
          <div class="card__body">
            <h2 class="card__title">Volcan</h2>
            <span class="card__tag">Geologie</span>
          </div>
        </article>

      </div>
    </div>
  </main>

  <!-- FOOTER -->
  <footer class="site-footer">
    <div class="container">
      <p>&copy; 2026 Galerie Paysages &mdash; Projet K8s</p>
    </div>
  </footer>

</body>
</html>
